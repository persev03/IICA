name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: Web quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  api:
    name: API quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e packages/iica-engine -e 'apps/api[dev]'
      - run: ruff check apps/api
      - run: mypy apps/api/src
      - run: pytest apps/api
      - run: alembic -c database/alembic.ini upgrade head --sql > /dev/null
